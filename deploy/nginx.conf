# SECFORIT Day0 - Nginx Reverse Proxy Configuration
# Routes: Next.js app + Ollama API through a single nginx instance
#
# Ubuntu 24.04 - /etc/nginx/sites-available/secforit
#
# Endpoints:
#   https://your-domain.com/         -> Next.js app (port 3000)
#   https://your-domain.com/ollama/  -> Ollama API (port 11434) [internal only]
#

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ollama_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# Upstream backends
upstream nextjs_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream ollama_backend {
    server 127.0.0.1:11434;
    keepalive 8;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # CHANGE THIS

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # CHANGE THIS

    # SSL - managed by certbot or manual
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;     # CHANGE THIS
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;   # CHANGE THIS

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://services.nvd.nist.gov https://www.cisa.gov;" always;

    # Logging
    access_log /var/log/nginx/secforit_access.log;
    error_log /var/log/nginx/secforit_error.log;

    # Max body size for API requests
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ============================================
    # Ollama API - INTERNAL ONLY (localhost access)
    # The Next.js app calls Ollama via 127.0.0.1
    # This block blocks external access to Ollama
    # ============================================
    location /ollama/ {
        # Only allow from localhost (Next.js server-side)
        allow 127.0.0.1;
        allow ::1;
        deny all;

        # Rate limit: 5 requests per minute per IP
        limit_req zone=ollama_limit burst=3 nodelay;

        # Proxy to Ollama
        proxy_pass http://ollama_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for LLM inference (up to 5 minutes)
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # ============================================
    # Next.js API routes
    # ============================================
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Longer timeout for AI bulletin generation
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ============================================
    # RSS Feed - cacheable
    # ============================================
    location /rss {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache RSS for 30 minutes
        proxy_cache_valid 200 30m;
    }

    # ============================================
    # Next.js static assets
    # ============================================
    location /_next/static/ {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Long cache for hashed static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Next.js - everything else
    # ============================================
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
